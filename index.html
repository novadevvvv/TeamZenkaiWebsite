<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Zenkai | Maintenance</title>
    <meta name="description" content="Team Zenkai is currently under maintenance.">
    <style>
        :root {
            color-scheme: dark;
            --bg-top: #111111;
            --bg-bottom: #1d140f;
            --panel: rgba(255, 245, 232, 0.08);
            --border: rgba(255, 245, 232, 0.16);
            --text: #fff7ef;
            --muted: #d6c1ad;
            --accent: #ff9c54;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 156, 84, 0.18), transparent 35%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        }

        main {
            width: min(720px, 100%);
            padding: 40px 32px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: var(--accent);
            font-size: 0.9rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.4rem, 7vw, 4.8rem);
            line-height: 0.95;
        }

        p {
            margin: 20px auto 0;
            max-width: 42ch;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">Status</p>
        <h1>Under Maintenance</h1>
        <p>The Team Zenkai site is being updated. Check back shortly.</p>
    </main>
</body>
</html>
